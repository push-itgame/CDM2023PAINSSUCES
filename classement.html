<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CDM 2026 édition Pains sucés — Classement</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=VT323&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C8A84B;
  --gold-light: #E5C97A;
  --dark: #0A0A0F;
  --surface: #111118;
  --card: #17171F;
  --border: rgba(200,168,75,0.2);
  --text: #F0EDE5;
  --muted: #8A8880;
  --green: #27AE60;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--dark); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
header {
  position: relative;
  overflow: hidden;
  padding: 3rem 2rem 2.5rem;
  text-align: center;
  border-bottom: 1px solid var(--border);
  background: radial-gradient(ellipse 120% 80% at 50% 0%, rgba(200,168,75,0.12) 0%, transparent 70%);
}
header::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(200,168,75,0.04) 40px),
              repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(200,168,75,0.04) 40px);
}
.trophy {
  display: block;
  font-size: clamp(2.25rem, 6vw, 3rem);
  line-height: 1;
  margin: 0 auto .35rem;
  filter: drop-shadow(0 3px 12px rgba(200,168,75,0.45));
  position: relative;
  z-index: 2;
}
.header-hero {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  z-index: 1;
}
header h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(3rem, 9vw, 6rem);
  letter-spacing: .08em;
  color: var(--gold);
  line-height: 1;
  text-shadow: 0 0 40px rgba(200,168,75,0.4);
  position: relative;
}
header h1 span { color: var(--text); }
.header-brand {
  position: relative;
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 0 0 1.1rem 0;
}
.edition-badge {
  position: absolute;
  left: 58%;
  bottom: -.15rem;
  transform: rotate(-22deg);
  transform-origin: center center;
  display: inline-flex;
  align-items: center;
  gap: .4rem;
  margin: 0;
  padding: .42rem .95rem .48rem;
  white-space: nowrap;
  background: rgba(6, 6, 10, 0.94);
  border: 2px solid rgba(200,168,75,0.72);
  border-radius: 999px;
  box-shadow: 0 6px 22px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.06);
  z-index: 3;
}
.edition-badge .edition-label {
  font-family: 'VT323', monospace;
  font-size: 1.15rem;
  letter-spacing: .06em;
  color: #e8e4dc;
  text-transform: uppercase;
  line-height: 1;
}
.edition-badge .edition-name {
  font-family: 'VT323', monospace;
  font-size: 1.15rem;
  letter-spacing: .04em;
  color: var(--gold-light);
  text-transform: uppercase;
  line-height: 1;
  text-shadow: 0 0 18px rgba(200,168,75,0.35);
}
.badge-deadline {
  display: inline-flex;
  align-items: center;
  gap: .4rem;
  background: rgba(192,57,43,0.15);
  border: 1px solid rgba(192,57,43,0.4);
  color: #E74C3C;
  font-family: 'DM Mono', monospace;
  font-size: .7rem;
  letter-spacing: .1em;
  padding: .3rem .75rem;
  border-radius: 2px;
  margin-top: 1rem;
  position: relative;
  z-index: 1;
}
nav {
  display: flex;
  overflow-x: auto;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  position: sticky;
  top: 0;
  z-index: 100;
}
nav::-webkit-scrollbar { height: 0; }
nav .tab-link {
  flex-shrink: 0;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: .72rem;
  letter-spacing: .15em;
  text-transform: uppercase;
  padding: 1rem 1.5rem;
  text-decoration: none;
  border-bottom: 2px solid transparent;
  transition: all .2s;
  display: inline-flex;
  align-items: center;
  white-space: nowrap;
}
nav .tab-link:hover { color: var(--gold); border-color: var(--gold); }
nav .tab-link.active { color: var(--gold); border-color: var(--gold); }
.page-subactions {
  display: flex;
  gap: .65rem;
  justify-content: center;
  flex-wrap: wrap;
  padding: .75rem 1rem;
  background: rgba(255,255,255,0.02);
  border-bottom: 1px solid var(--border);
}
.page-subactions a,
.page-subactions button {
  font-family: 'DM Mono', monospace;
  font-size: .68rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--gold);
  border: 1px solid var(--border);
  padding: .45rem .85rem;
  border-radius: 3px;
  text-decoration: none;
  background: transparent;
  cursor: pointer;
}
.page-subactions a:hover,
.page-subactions button:hover { background: rgba(200,168,75,0.1); }
.lb-link {
  font-family: 'DM Mono', monospace;
  font-size: .65rem;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--gold);
  text-decoration: none;
  border: 1px solid var(--border);
  padding: .25rem .45rem;
  border-radius: 3px;
  white-space: nowrap;
}
.lb-link:hover { background: rgba(200,168,75,0.1); }
@media (max-width: 520px) {
  header { padding: 1.75rem .85rem 1.25rem; }
  .header-brand { padding-bottom: 0; width: 100%; }
  .edition-badge {
    position: static;
    transform: none;
    margin-top: .6rem;
    left: auto;
    bottom: auto;
  }
  nav .tab-link { padding: .8rem .85rem; font-size: .62rem; letter-spacing: .1em; }
}
.container { max-width: 1100px; margin: 0 auto; padding: 2rem 1rem 3rem; }
.meta { font-family: 'DM Mono', monospace; font-size: .72rem; color: var(--muted); margin-bottom: 1.5rem; }
.meta strong { color: var(--text); }
.empty {
  background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 2rem; text-align: center; color: var(--muted);
}
.leaderboard-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 4px; background: var(--card); }
table.lb { width: 100%; border-collapse: collapse; min-width: 820px; table-layout: fixed; }
table.lb th {
  font-family: 'DM Mono', monospace; font-size: .65rem; letter-spacing: .12em; text-transform: uppercase;
  color: var(--muted); text-align: left; padding: .75rem .6rem; border-bottom: 1px solid var(--border); background: var(--surface);
  vertical-align: bottom;
}
table.lb td { padding: .65rem .6rem; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: .9rem; vertical-align: middle; }
table.lb tr:hover td { background: rgba(200,168,75,0.04); }
table.lb th.col-rank, table.lb td.rank { width: 2.75rem; text-align: center; padding-left: .4rem; padding-right: .4rem; }
table.lb th.col-name { width: auto; }
table.lb th.col-pts, table.lb td.pts {
  text-align: center;
  padding-left: .45rem;
  padding-right: .45rem;
  white-space: nowrap;
}
table.lb th.col-pts {
  font-size: .58rem;
  line-height: 1.35;
  letter-spacing: .08em;
  vertical-align: middle;
}
table.lb th.col-detail, table.lb td.col-detail { width: 4.75rem; text-align: center; padding-left: .35rem; padding-right: .35rem; }
.rank { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; color: var(--gold); }
.name { font-weight: 600; }
.sub { font-size: .78rem; color: var(--muted); }
.pts { font-family: 'DM Mono', monospace; font-weight: 600; color: var(--gold); }
.pts-muted { color: var(--muted) !important; opacity: .65; font-weight: 500; }
.total { font-size: 1rem; }
.err { color: #E74C3C; margin-top: 1rem; font-size: .85rem; }
.my-score-card {
  background: var(--card);
  border: 1px solid rgba(200,168,75,0.35);
  border-radius: 4px;
  padding: 1.1rem 1.25rem;
  margin-bottom: 1.5rem;
}
.my-score-card h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.35rem;
  letter-spacing: .1em;
  color: var(--gold);
  margin-bottom: .75rem;
}
.my-score-card.hidden { display: none; }
.my-score-summary {
  display: flex;
  flex-wrap: wrap;
  gap: 1rem 1.5rem;
  align-items: center;
  font-size: .88rem;
}
.my-score-summary .rank-big {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2rem;
  color: var(--gold);
  line-height: 1;
}
.my-score-summary .pts-big {
  font-family: 'DM Mono', monospace;
  font-size: 1.25rem;
  color: var(--gold);
  font-weight: 600;
}
table.lb tr.lb-row-me td {
  background: rgba(200,168,75,0.12) !important;
  border-bottom-color: rgba(200,168,75,0.25);
}
table.lb tr.lb-row-me .rank { color: var(--gold-light); }
.live-scores-widget {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1rem 1.15rem;
  margin-bottom: 1.5rem;
}
.live-scores-widget.loading { opacity: .7; }
.live-scores-head {
  display: flex;
  flex-wrap: wrap;
  justify-content: space-between;
  align-items: baseline;
  gap: .5rem;
  margin-bottom: .75rem;
}
.live-scores-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.2rem;
  letter-spacing: .08em;
  color: var(--gold);
}
.live-scores-updated {
  font-family: 'DM Mono', monospace;
  font-size: .62rem;
  color: var(--muted);
  letter-spacing: .06em;
}
.live-scores-list { list-style: none; display: flex; flex-direction: column; gap: .45rem; }
.live-scores-item {
  display: flex;
  flex-wrap: wrap;
  gap: .35rem 1rem;
  align-items: center;
  padding: .45rem 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  font-size: .88rem;
}
.live-scores-item.is-live .live-scores-status { color: #e74c3c; }
.live-scores-status {
  font-family: 'DM Mono', monospace;
  font-size: .68rem;
  min-width: 4.5rem;
}
.live-scores-teams strong { color: var(--gold); margin: 0 .35rem; }
.live-scores-msg, .live-scores-foot {
  font-size: .78rem;
  color: var(--muted);
  line-height: 1.45;
}
.live-scores-foot { margin-top: .65rem; }
.live-scores-foot a { color: var(--gold); }
.live-scores-foot code { color: var(--gold); font-size: .72rem; }
</style>
</head>
<body>
<header>
  <div class="header-hero">
    <div class="header-brand">
      <span class="trophy">🏆</span>
      <h1>CDM<span>2026</span></h1>
      <p class="edition-badge"><span class="edition-label">édition</span><span class="edition-name">Pains sucés</span></p>
    </div>
  </div>
  <div class="badge-deadline">⏱ Date limite : 11 juin 2026</div>
</header>

<nav id="tabs">
  <a href="index.html" class="tab-link">👤 Inscription</a>
  <a href="index.html#poules" class="tab-link">⚽ Poules</a>
  <a href="index.html#tableau" class="tab-link">🎯 Phase finale — tableau</a>
  <a href="index.html#scores-finales" class="tab-link">🎯 Phase finale — scores</a>
  <a href="index.html#bonus" class="tab-link">🌟 Bonus</a>
  <a href="index.html#envoyer" class="tab-link">📤 Envoyer</a>
  <a href="index.html#regles" class="tab-link">📋 Règlement</a>
  <a href="classement.html" class="tab-link active">🏆 Classement</a>
</nav>

<div class="page-subactions">
  <a href="mon-score.html">Voir mon score</a>
  <button type="button" id="btnRefresh">Actualiser</button>
</div>

<main class="container">
  <div id="live-scores-root" class="live-scores-widget" aria-live="polite"></div>

  <div class="my-score-card hidden" id="myScoreCard" aria-live="polite">
    <div id="myScoreSummary" class="my-score-summary"></div>
  </div>

  <p class="meta" id="metaLine">Chargement…</p>
  <div id="content"></div>
  <p class="err" id="errLine" hidden></p>
</main>
<script src="js/config.js"></script>
<script src="js/supabase-api.js"></script>
<script src="js/scoring.js?v=3"></script>
<script src="js/live-scores.js"></script>
<script>
const LS_EMAIL_KEY = 'cdm2026_email';
let highlightEmail = '';
const formatScoreCell = CDM_SCORING.formatScoreCell || ((v, vis) => (vis ? v : '—'));
const { scoreParticipant, normalizeTeam } = CDM_SCORING;

function renderTable(rows, etape) {
  if (!rows.length) {
    return '<div class="empty"><p>Aucun participant pour le moment.</p><p style="margin-top:.75rem">Les joueurs envoient leur grille depuis l’onglet <strong>📤 Envoyer</strong>.</p></div>';
  }
  const normHighlight = normalizeTeam(highlightEmail);
  const trs = rows.map((r, i) => {
    const detail = r.email
      ? `<a class="lb-link" href="mon-score.html?email=${encodeURIComponent(r.email)}">Détail</a>`
      : '—';
    const isMe = normHighlight && normalizeTeam(r.email) === normHighlight;
    return `
    <tr class="${isMe ? 'lb-row-me' : ''}">
      <td class="rank">${i + 1}</td>
      <td><div class="name">${escapeHtml(r.label)}${isMe ? ' <span style="color:var(--gold);font-size:.75rem">← vous</span>' : ''}</div><div class="sub">${escapeHtml(r.sub || '')}</div></td>
      <td class="pts${r.visible?.poules ? '' : ' pts-muted'}">${formatScoreCell(r.poules, r.visible?.poules)}</td>
      <td class="pts${r.visible?.tableauE2 ? '' : ' pts-muted'}">${formatScoreCell(r.tableauE2, r.visible?.tableauE2 !== false)}</td>
      <td class="pts${r.visible?.finales ? '' : ' pts-muted'}">${formatScoreCell(r.finales, r.visible?.finales)}</td>
      <td class="pts${r.visible?.bonusCompetition ? '' : ' pts-muted'}">${formatScoreCell(r.bonus, r.visible?.bonus)}</td>
      <td class="pts total">${r.total}</td>
      <td class="col-detail">${detail}</td>
    </tr>`;
  }).join('');
  return `<div class="leaderboard-wrap"><table class="lb"><thead><tr>
    <th class="col-rank">#</th>
    <th class="col-name">Participant</th>
    <th class="col-pts">Poules</th>
    <th class="col-pts">Phase fin.<br>tableau</th>
    <th class="col-pts">Phase fin.<br>scores</th>
    <th class="col-pts">Bonus</th>
    <th class="col-pts">Total</th>
    <th class="col-detail">Détail</th>
  </tr></thead><tbody>${trs}</tbody></table></div>`;
}

function renderMyScoreSummary(rows) {
  const card = document.getElementById('myScoreCard');
  const el = document.getElementById('myScoreSummary');
  if (!el || !card) return;
  if (!highlightEmail) {
    card.classList.add('hidden');
    return;
  }
  const norm = normalizeTeam(highlightEmail);
  const idx = rows.findIndex(r => normalizeTeam(r.email) === norm);
  if (idx < 0) {
    el.innerHTML = '<span style="color:var(--muted)">Grille non trouvée pour l’e-mail mémorisé sur cet appareil.</span> '
      + `<a class="lb-link" href="mon-score.html?email=${encodeURIComponent(highlightEmail)}">Vérifier sur Mon score →</a>`;
    card.classList.remove('hidden');
    return;
  }
  const r = rows[idx];
  const detailLink = r.email
    ? `<a class="lb-link" href="mon-score.html?email=${encodeURIComponent(r.email)}">Détail match par match →</a>`
    : '';
  el.innerHTML = `
    <span class="rank-big">#${idx + 1}</span>
    <span><strong>${escapeHtml(r.label)}</strong> <span style="color:var(--gold);font-size:.75rem">← vous</span><br><span style="color:var(--muted);font-size:.8rem">Poules ${formatScoreCell(r.poules, r.visible?.poules)} · Ph. fin. tab. ${formatScoreCell(r.tableauE2, r.visible?.tableauE2)} · Ph. fin. scores ${formatScoreCell(r.finales, r.visible?.finales)} · Bonus ${formatScoreCell(r.bonus, r.visible?.bonus)}</span></span>
    <span class="pts-big">${r.total} pts</span>
    ${detailLink}`;
  card.classList.remove('hidden');
}

function loadStoredEmail() {
  try {
    const direct = localStorage.getItem(LS_EMAIL_KEY);
    if (direct) return direct.trim();
    const grid = localStorage.getItem('cdm2026_grid');
    if (grid) {
      const st = JSON.parse(grid);
      return (st.identite?.email || '').trim();
    }
  } catch (e) { /* ignore */ }
  return '';
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function loadJson(path) {
  const res = await fetch(path + '?t=' + Date.now());
  if (!res.ok) throw new Error(path + ' (' + res.status + ')');
  return res.json();
}

async function loadParticipants() {
  if (window.CDM_SUPABASE?.loadParticipantsMerged) {
    return CDM_SUPABASE.loadParticipantsMerged(loadJson);
  }
  const data = await loadJson('data/participants.json');
  return data.participants || [];
}

async function refresh() {
  const errEl = document.getElementById('errLine');
  const metaEl = document.getElementById('metaLine');
  const content = document.getElementById('content');
  errEl.hidden = true;
  try {
    const [participants, resultats] = await Promise.all([
      loadParticipants(),
      loadJson('data/resultats.json'),
    ]);
    const etape = resultats.etapeDebloquee || 0;
    const rows = participants.map(p => {
      const id = p.identite || {};
      const label = [id.prenom, id.nom].filter(Boolean).join(' ') || 'Anonyme';
      const sub = id.equipe || '';
      const sc = scoreParticipant(p, resultats);
      const email = (id.email || '').trim();
      return { label, sub, email, ...sc };
    }).sort((a, b) => b.total - a.total || a.label.localeCompare(b.label, 'fr'));

    const maj = resultats.meta?.misAJour || 'non renseignée';
    metaEl.innerHTML = 'Étape officielle : <strong>' + etape + '</strong> · Dernière MAJ : <strong>' + escapeHtml(maj) + '</strong> — '
      + participants.length + ' participant(s). Score progressif (0 = rien · 1 = poules · 2 = tableau · 7 = bonus compétition).';
    content.innerHTML = renderTable(rows, etape);
    renderMyScoreSummary(rows);
    if (highlightEmail && document.querySelector('.lb-row-me')) {
      requestAnimationFrame(() => {
        document.querySelector('.lb-row-me')?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      });
    }
  } catch (e) {
    errEl.textContent = 'Erreur de chargement : ' + e.message + '. Ouvrez la page via un serveur local si les JSON sont bloqués (file://).';
    errEl.hidden = false;
    metaEl.textContent = 'Impossible de charger les données.';
    content.innerHTML = '<div class="empty"><p>En attente de données valides.</p></div>';
  }
}

document.getElementById('btnRefresh').addEventListener('click', e => { e.preventDefault(); refresh(); });

highlightEmail = loadStoredEmail();

if (window.CDM_LIVE_SCORES?.mount) CDM_LIVE_SCORES.mount('live-scores-root');

refresh();
setInterval(refresh, 5 * 60 * 1000);
</script>
</body>
</html>
