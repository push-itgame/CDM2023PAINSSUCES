<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CDM 2026 — Mon score</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C8A84B;
  --dark: #0A0A0F;
  --surface: #111118;
  --card: #17171F;
  --border: rgba(200,168,75,0.2);
  --text: #F0EDE5;
  --muted: #8A8880;
  --green: #27AE60;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--dark); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
header {
  padding: 2rem 1rem 1.5rem;
  text-align: center;
  border-bottom: 1px solid var(--border);
  background: radial-gradient(ellipse 120% 80% at 50% 0%, rgba(200,168,75,0.1) 0%, transparent 70%);
}
header h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(2rem, 7vw, 3.5rem);
  letter-spacing: .08em;
  color: var(--gold);
}
.subtitle { font-family: 'DM Mono', monospace; font-size: .72rem; letter-spacing: .2em; color: var(--muted); text-transform: uppercase; margin-top: .35rem; }
.top-actions { margin-top: 1rem; display: flex; gap: .6rem; justify-content: center; flex-wrap: wrap; }
.top-actions a {
  font-family: 'DM Mono', monospace; font-size: .68rem; letter-spacing: .1em; text-transform: uppercase;
  color: var(--gold); border: 1px solid var(--border); padding: .45rem .85rem; border-radius: 3px; text-decoration: none;
}
.container { max-width: 820px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
.lookup {
  display: flex; flex-wrap: wrap; gap: .5rem; margin-bottom: 1.25rem;
}
.lookup input {
  flex: 1; min-width: 200px;
  background: var(--card); border: 1px solid var(--border); border-radius: 4px;
  color: var(--text); padding: .65rem .75rem; font-family: inherit; font-size: .95rem;
}
.lookup button {
  font-family: 'DM Mono', monospace; font-size: .68rem; letter-spacing: .08em; text-transform: uppercase;
  background: var(--gold); color: var(--dark); border: none; border-radius: 3px; padding: .65rem 1.1rem; cursor: pointer; font-weight: 600;
}
.summary {
  background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 1rem 1.1rem; margin-bottom: 1.25rem;
}
.summary h2 { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: .06em; color: var(--gold); margin-bottom: .25rem; }
.summary .sub { font-size: .82rem; color: var(--muted); margin-bottom: .75rem; }
.summary-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: .5rem;
}
.summary-grid div {
  background: rgba(255,255,255,0.03); border-radius: 4px; padding: .5rem .6rem; text-align: center;
}
.summary-grid span { display: block; font-family: 'DM Mono', monospace; font-size: .58rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
.summary-grid strong { font-family: 'Bebas Neue', sans-serif; font-size: 1.35rem; color: var(--gold); }
.fold-section {
  margin-bottom: .85rem;
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  background: var(--card);
}
.fold-head {
  display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: .5rem;
  padding: .75rem 1rem;
  background: rgba(255,255,255,0.02);
  border-bottom: 1px solid transparent;
  cursor: pointer;
  user-select: none;
}
.fold-section.open .fold-head { border-bottom-color: var(--border); }
.fold-head strong { font-family: 'Bebas Neue', sans-serif; font-size: 1.05rem; letter-spacing: .12em; color: var(--text); }
.fold-meta { font-family: 'DM Mono', monospace; font-size: .65rem; color: var(--muted); }
.fold-chevron { font-size: .75rem; color: var(--muted); transition: transform .15s; }
.fold-section.open .fold-chevron { transform: rotate(180deg); }
.fold-body { display: none; padding: .65rem .75rem .85rem; }
.fold-section.open .fold-body { display: block; }
.match-line {
  display: grid;
  grid-template-columns: 2.5rem 1fr auto;
  gap: .5rem;
  align-items: center;
  padding: .45rem .5rem;
  border-radius: 4px;
  margin-bottom: .35rem;
  font-size: .82rem;
  border: 1px solid rgba(255,255,255,0.04);
}
.match-line.pred-hit {
  border-color: rgba(39,174,96,0.38);
  background: rgba(39,174,96,0.07);
}
.match-line .mid { font-family: 'DM Mono', monospace; font-size: .62rem; color: var(--muted); }
.match-line .teams { line-height: 1.35; }
.match-line .teams small { display: block; color: var(--muted); font-size: .72rem; margin-top: .15rem; }
.pred-pts-badge {
  font-family: 'DM Mono', monospace; font-size: .58rem; font-weight: 600;
  color: #6fcf97; background: rgba(39,174,96,0.14); border: 1px solid rgba(39,174,96,0.32);
  border-radius: 3px; padding: .15rem .4rem; white-space: nowrap;
}
.section-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.15rem;
  letter-spacing: .1em;
  color: var(--gold);
  margin: 1.5rem 0 .75rem;
}
.empty, .err {
  background: var(--card); border: 1px solid var(--border); border-radius: 4px;
  padding: 1.5rem; text-align: center; color: var(--muted); font-size: .9rem;
}
.err { color: #E74C3C; border-color: rgba(231,76,60,0.35); text-align: left; }
</style>
</head>
<body>
<header>
  <h1>Mon score</h1>
  <p class="subtitle">CDM 2026 · édition Pains sucés</p>
  <div class="top-actions">
    <a href="index.html">← Grille</a>
    <a href="classement.html">Classement</a>
  </div>
</header>
<main class="container">
  <form class="lookup" id="lookupForm">
    <input type="email" id="emailInput" placeholder="Votre e-mail d'inscription" required autocomplete="email">
    <button type="submit">Voir mon score</button>
  </form>
  <div id="content"><div class="empty">Entrez votre e-mail pour voir le détail de vos points.</div></div>
</main>
<script src="js/config.js"></script>
<script src="js/supabase-api.js"></script>
<script>
const GROUPS = {
  "Groupe A": [[1,"Mexique","Afrique du Sud"],[2,"Corée du Sud","Rép. Tchèque"],[25,"Rép. Tchèque","Afrique du Sud"],[28,"Mexique","Corée du Sud"],[53,"Rép. Tchèque","Mexique"],[54,"Afrique du Sud","Corée du Sud"]],
  "Groupe B": [[3,"Canada","Bosnie Herzégovine"],[5,"Qatar","Suisse"],[26,"Suisse","Bosnie Herzégovine"],[27,"Canada","Qatar"],[49,"Suisse","Canada"],[50,"Bosnie Herzégovine","Qatar"]],
  "Groupe C": [[6,"Brésil","Maroc"],[7,"Haïti","Écosse"],[30,"Écosse","Maroc"],[31,"Brésil","Haïti"],[51,"Écosse","Brésil"],[52,"Maroc","Haïti"]],
  "Groupe D": [[4,"États-Unis","Paraguay"],[8,"Australie","Turquie"],[32,"Turquie","Paraguay"],[29,"États-Unis","Australie"],[59,"Turquie","États-Unis"],[60,"Paraguay","Australie"]],
  "Groupe E": [[9,"Allemagne","Curacao"],[11,"Côte d'Ivoire","Équateur"],[35,"Équateur","Curacao"],[34,"Allemagne","Côte d'Ivoire"],[55,"Équateur","Allemagne"],[56,"Curacao","Côte d'Ivoire"]],
  "Groupe F": [[10,"Pays-Bas","Japon"],[12,"Suède","Tunisie"],[36,"Tunisie","Japon"],[33,"Pays-Bas","Suède"],[57,"Tunisie","Pays-Bas"],[58,"Japon","Suède"]],
  "Groupe G": [[14,"Belgique","Égypte"],[16,"Iran","Nouvelle Zélande"],[40,"Nouvelle Zélande","Égypte"],[38,"Belgique","Iran"],[65,"Nouvelle Zélande","Belgique"],[66,"Égypte","Iran"]],
  "Groupe H": [[13,"Espagne","Cap Vert"],[15,"Arabie Saoudite","Uruguay"],[39,"Uruguay","Cap Vert"],[37,"Espagne","Arabie Saoudite"],[63,"Uruguay","Espagne"],[64,"Cap Vert","Arabie Saoudite"]],
  "Groupe I": [[17,"France","Sénégal"],[18,"Irak","Norvège"],[43,"Norvège","Sénégal"],[42,"France","Irak"],[61,"Norvège","France"],[62,"Sénégal","Irak"]],
  "Groupe J": [[19,"Argentine","Algérie"],[20,"Autriche","Jordanie"],[44,"Jordanie","Algérie"],[41,"Argentine","Autriche"],[71,"Jordanie","Argentine"],[72,"Algérie","Autriche"]],
  "Groupe K": [[21,"Portugal","RD Congo"],[24,"Ouzbékistan","Colombie"],[48,"Colombie","RD Congo"],[45,"Portugal","Ouzbékistan"],[69,"Colombie","Portugal"],[70,"RD Congo","Ouzbékistan"]],
  "Groupe L": [[22,"Angleterre","Croatie"],[23,"Ghana","Panama"],[47,"Panama","Croatie"],[46,"Angleterre","Ghana"],[67,"Panama","Angleterre"],[68,"Croatie","Ghana"]],
};

function parseIntSafe(v) {
  const n = parseInt(String(v ?? '').trim(), 10);
  return Number.isFinite(n) ? n : null;
}

function matchOutcome(h, a) {
  if (h == null || a == null) return null;
  if (h > a) return 'H';
  if (h < a) return 'A';
  return 'D';
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtScore(h, a) {
  if (h == null || a == null) return '—';
  return h + ' – ' + a;
}

function scorePouleMatchDetail(pred, real) {
  if (!pred || !real) return { status: 'pending', pts: 0 };
  const rh = parseIntSafe(real.scoreHome ?? real.homeScore);
  const ra = parseIntSafe(real.scoreAway ?? real.awayScore);
  if (rh == null || ra == null) return { status: 'pending', pts: 0 };
  const ph = parseIntSafe(pred.scoreHome);
  const pa = parseIntSafe(pred.scoreAway);
  if (ph == null || pa == null) return { status: 'no-pred', pts: 0 };
  const ro = matchOutcome(rh, ra);
  const po = matchOutcome(ph, pa);
  if (!ro || !po || ro !== po) return { status: 'miss', pts: 0 };
  const exact = rh === ph && ra === pa;
  let base = exact ? 5 : 3;
  const totalReal = rh + ra;
  if (totalReal >= 6) base *= 2;
  else if (totalReal >= 4) base *= 1.5;
  const pts = Math.round(base * 10) / 10;
  return { status: 'hit', pts, exact };
}

function scoreGroupMatches(predMatchs, realMatchs) {
  let pts = 0;
  for (const [key, real] of Object.entries(realMatchs || {})) {
    const d = scorePouleMatchDetail((predMatchs || {})[key], real);
    if (d.status === 'hit') pts += d.pts;
  }
  return Math.round(pts * 10) / 10;
}

function scoreTableau(participant, resultats) {
  function norm(s) { return String(s ?? '').trim().toLowerCase(); }
  function inter(pred, real, p) {
    const rs = new Set((real || []).map(norm).filter(Boolean));
    let t = 0;
    for (const x of pred || []) if (rs.has(norm(x))) t += p;
    return t;
  }
  const p = participant.phaseFinalePourBareme || {};
  const e2 = participant.etape2Tableau || participant.etape2 || {};
  const pred = {
    l32: (p.liste32QualifiesIssuesPoules?.length ? p.liste32QualifiesIssuesPoules : e2.r32) || participant.equipesQualifiees32Liste || [],
    r16: (p.vainqueursSeiziemePourHuitiemes16?.length ? p.vainqueursSeiziemePourHuitiemes16 : e2.r16) || [],
    qf: (p.vainqueursHuitiemesPourQuarts8?.length ? p.vainqueursHuitiemesPourQuarts8 : e2.qf) || [],
    sf: (p.vainqueursQuartsPourDemis4?.length ? p.vainqueursQuartsPourDemis4 : e2.sf) || [],
    fin: (p.finalistesChoisis?.length ? p.finalistesChoisis : e2.finalists) || [],
    win: p.vainqueurFinal || e2.winner || '',
  };
  const r = resultats.phaseFinalePourBareme || {};
  const real32 = r.liste32QualifiesIssuesPoules?.length ? r.liste32QualifiesIssuesPoules : (resultats.equipesQualifiees32Liste || []);
  let pts = 0;
  pts += inter(pred.l32, real32, 3);
  pts += inter(pred.r16, r.vainqueursSeiziemePourHuitiemes16, 5);
  pts += inter(pred.qf, r.vainqueursHuitiemesPourQuarts8, 12);
  pts += inter(pred.sf, r.vainqueursQuartsPourDemis4, 20);
  pts += inter(pred.fin, r.finalistesChoisis, 35);
  if (norm(pred.win) && norm(pred.win) === norm(r.vainqueurFinal)) pts += 50;
  return pts;
}

function scoreEliminationKO(participant, resultats) {
  const predWinners = participant.vainqueursTableauEliminationChoisis || {};
  const realWinners = resultats.vainqueursTableauElimination || {};
  const realScores = resultats.scoresElimination || {};
  let pts = 0;
  for (let m = 73; m <= 104; m++) {
    const key = 'Match ' + m;
    const realW = realWinners[key] || realWinners[String(m)] || '';
    if (!realW) continue;
    const predW = predWinners[m] || predWinners[key] || predWinners[String(m)] || '';
    const scReal = realScores[key] || realScores[String(m)];
    if (scReal && parseIntSafe(scReal.scoreHome) != null && parseIntSafe(scReal.scoreAway) != null) {
      const predSc = participant.scoresElimination?.[key] || participant.scoresElimination?.[String(m)];
      const ph = parseIntSafe(predSc?.scoreHome);
      const pa = parseIntSafe(predSc?.scoreAway);
      if (ph != null && pa != null && ph === parseIntSafe(scReal.scoreHome) && pa === parseIntSafe(scReal.scoreAway)) {
        pts += 10;
        continue;
      }
    }
    const norm = s => String(s ?? '').trim().toLowerCase();
    if (norm(predW) && norm(predW) === norm(realW)) pts += 6;
  }
  return pts;
}

function scoreBonus(predBonus, realBonus) {
  if (!predBonus || !realBonus) return 0;
  let pts = 0;
  for (const k of Object.keys(realBonus)) {
    const p = String(predBonus[k] ?? '').trim();
    const r = String(realBonus[k] ?? '').trim();
    if (!p || !r) continue;
    if (k === 'nbButs') {
      const pn = parseIntSafe(p), rn = parseIntSafe(r);
      if (pn != null && rn != null && Math.abs(pn - rn) <= 3) pts += 25;
    } else if (p.toLowerCase() === r.toLowerCase()) pts += 25;
  }
  return pts;
}

function renderGroupSection(gname, matches, predMatchs, realMatchs, openDefault) {
  let groupPts = 0, hits = 0, official = 0;
  const lines = matches.map(([num, home, away]) => {
    const key = 'Match ' + num;
    const pred = predMatchs[key];
    const real = realMatchs[key];
    const d = scorePouleMatchDetail(pred, real);
    if (d.status === 'hit') { groupPts += d.pts; hits++; official++; }
    else if (real && parseIntSafe(real.scoreHome) != null) official++;
    const ph = parseIntSafe(pred?.scoreHome);
    const pa = parseIntSafe(pred?.scoreAway);
    const rh = parseIntSafe(real?.scoreHome);
    const ra = parseIntSafe(real?.scoreAway);
    const hitCls = d.status === 'hit' ? ' pred-hit' : '';
    const badge = d.status === 'hit' ? `<span class="pred-pts-badge">+${d.pts}</span>` : '';
    const sub = d.status === 'pending'
      ? '<small>Résultat officiel en attente</small>'
      : `<small>Prono ${fmtScore(ph, pa)} · Officiel ${fmtScore(rh, ra)}</small>`;
    return `<div class="match-line${hitCls}">
      <span class="mid">M${num}</span>
      <div class="teams">${escapeHtml(home)} – ${escapeHtml(away)}${sub}</div>
      ${badge}
    </div>`;
  }).join('');

  const openCls = openDefault ? ' open' : '';
  return `<div class="fold-section${openCls}" data-fold>
    <div class="fold-head" role="button" tabindex="0" aria-expanded="${openDefault ? 'true' : 'false'}">
      <div>
        <strong>${escapeHtml(gname)}</strong>
        <div class="fold-meta">${hits}/${matches.length} trouvé(s)${official ? ' · ' + official + ' officiel(s)' : ''}${groupPts ? ' · +' + groupPts + ' pts' : ''}</div>
      </div>
      <span class="fold-chevron">▼</span>
    </div>
    <div class="fold-body">${lines}</div>
  </div>`;
}

function wireFolds(root) {
  root.querySelectorAll('[data-fold]').forEach(section => {
    const head = section.querySelector('.fold-head');
    const toggle = () => {
      section.classList.toggle('open');
      head.setAttribute('aria-expanded', section.classList.contains('open') ? 'true' : 'false');
    };
    head.addEventListener('click', toggle);
    head.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); } });
  });
}

function renderParticipant(participant, resultats) {
  const id = participant.identite || {};
  const label = [id.prenom, id.nom].filter(Boolean).join(' ') || 'Participant';
  const poules = scoreGroupMatches(participant.matchs, resultats.matchs);
  const tableau = scoreTableau(participant, resultats) + scoreEliminationKO(participant, resultats);
  const bonus = scoreBonus(participant.bonus, resultats.bonus);
  const total = Math.round((poules + tableau + bonus) * 10) / 10;

  let groupsHtml = '';
  let i = 0;
  for (const [gname, matches] of Object.entries(GROUPS)) {
    groupsHtml += renderGroupSection(gname, matches, participant.matchs || {}, resultats.matchs || {}, i === 0);
    i++;
  }

  return `
    <div class="summary">
      <h2>${escapeHtml(label)}</h2>
      <div class="sub">${escapeHtml(id.equipe || id.email || '')}</div>
      <div class="summary-grid">
        <div><span>Poules</span><strong>${poules}</strong></div>
        <div><span>Tableau & KO</span><strong>${tableau}</strong></div>
        <div><span>Bonus</span><strong>${bonus}</strong></div>
        <div><span>Total</span><strong>${total}</strong></div>
      </div>
    </div>
    <h2 class="section-title">Phase de groupes</h2>
    <p style="font-size:.82rem;color:var(--muted);margin:-.35rem 0 .85rem">Cliquez sur un groupe pour l’ouvrir ou le refermer.</p>
    ${groupsHtml}
  `;
}

async function loadJson(path) {
  const res = await fetch(path + '?t=' + Date.now());
  if (!res.ok) throw new Error(path + ' (' + res.status + ')');
  return res.json();
}

async function loadParticipants() {
  if (window.CDM_SUPABASE?.loadParticipantsMerged) {
    return CDM_SUPABASE.loadParticipantsMerged(loadJson);
  }
  const data = await loadJson('data/participants.json');
  return data.participants || [];
}

function prefillEmail() {
  const params = new URLSearchParams(location.search);
  const fromUrl = params.get('email');
  if (fromUrl) {
    document.getElementById('emailInput').value = fromUrl;
    return fromUrl.trim().toLowerCase();
  }
  try {
    const saved = JSON.parse(localStorage.getItem('cdm2026_grid') || '{}');
    const em = (saved.identite?.email || '').trim();
    if (em) document.getElementById('emailInput').value = em;
    return em.toLowerCase();
  } catch (e) { return ''; }
}

async function showScore(email) {
  const content = document.getElementById('content');
  email = (email || '').trim().toLowerCase();
  if (!email) {
    content.innerHTML = '<div class="empty">Entrez votre e-mail d’inscription.</div>';
    return;
  }
  content.innerHTML = '<div class="empty">Chargement…</div>';
  try {
    const [participants, resultats] = await Promise.all([
      loadParticipants(),
      loadJson('data/resultats.json'),
    ]);
    const p = participants.find(x => ((x.identite || {}).email || '').trim().toLowerCase() === email);
    if (!p) {
      content.innerHTML = '<div class="err">Aucune grille trouvée pour <strong>' + escapeHtml(email) + '</strong>. Vérifiez l’e-mail ou envoyez votre grille depuis la page d’inscription.</div>';
      return;
    }
    content.innerHTML = renderParticipant(p, resultats);
    wireFolds(content);
    history.replaceState(null, '', '?email=' + encodeURIComponent(email));
  } catch (e) {
    content.innerHTML = '<div class="err">Erreur : ' + escapeHtml(e.message) + '</div>';
  }
}

document.getElementById('lookupForm').addEventListener('submit', e => {
  e.preventDefault();
  showScore(document.getElementById('emailInput').value);
});

const initial = prefillEmail();
if (initial) showScore(initial);
</script>
</body>
</html>
